name: Build and Publish Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version to build (e.g. 3.10). Leave empty to build all."
        required: false
        type: string
      arch:
        description: "Architecture to build (x86_64 or aarch64). Leave empty to build all."
        required: false
        type: string

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Determine Build Matrix
    runs-on: ubuntu-latest
    outputs:
      modern_matrix: ${{ steps.set-matrix.outputs.modern_matrix }}
      legacy_matrix: ${{ steps.set-matrix.outputs.legacy_matrix }}
      py36_matrix: ${{ steps.set-matrix.outputs.py36_matrix }}
    steps:
      - id: set-matrix
        name: Generate matrix configuration
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          py_ver="${{ github.event.inputs.python-version }}"
          arch="${{ github.event.inputs.arch }}"

          full_modern_matrix='[
            {"python-version": "3.14", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp314-*"},
            {"python-version": "3.13", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp313-*"},
            {"python-version": "3.12", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp312-*"},
            {"python-version": "3.11", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp311-*"},
            {"python-version": "3.10", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp310-*"},
            {"python-version": "3.9", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp39-*"},
            {"python-version": "3.8", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp38-*"},
            {"python-version": "3.14", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp314-*"},
            {"python-version": "3.13", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp313-*"},
            {"python-version": "3.12", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp312-*"},
            {"python-version": "3.11", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp311-*"},
            {"python-version": "3.10", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp310-*"},
            {"python-version": "3.9", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp39-*"},
            {"python-version": "3.8", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp38-*"}
          ]'
          full_legacy_matrix='[
            {"python-version": "3.7", "arch": "x86_64", "runner": "ubuntu-latest", "cibw-build-id": "cp37-*"},
            {"python-version": "3.7", "arch": "aarch64", "runner": "ubuntu-22.04-arm", "cibw-build-id": "cp37-*"}
          ]'
          full_py36_matrix='[
            {"arch": "x86_64", "runner": "ubuntu-latest"},
            {"arch": "aarch64", "runner": "ubuntu-22.04-arm"}
          ]'

          filter_matrix() {
            local matrix_json="$1"
            local expr="."
            if [[ -n "$py_ver" ]]; then
              expr+=" | map(select(.\"python-version\" == \"$py_ver\"))"
            fi
            if [[ -n "$arch" ]]; then
              expr+=" | map(select(.arch == \"$arch\"))"
            fi
            echo "$matrix_json" | jq -c "$expr"
          }

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "modern_matrix=$(echo "$full_modern_matrix" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "legacy_matrix=$(echo "$full_legacy_matrix" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "py36_matrix=$(echo "$full_py36_matrix" | jq -c .)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$py_ver" || ( "$py_ver" != "3.6" && "$py_ver" != "3.7" ) ]]; then
            echo "modern_matrix=$(filter_matrix "$full_modern_matrix")" >> "$GITHUB_OUTPUT"
          else
            echo "modern_matrix=[]" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$py_ver" || "$py_ver" == "3.7" ]]; then
            echo "legacy_matrix=$(filter_matrix "$full_legacy_matrix")" >> "$GITHUB_OUTPUT"
          else
            echo "legacy_matrix=[]" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$py_ver" || "$py_ver" == "3.6" ]]; then
            py36_expr="."
            if [[ -n "$arch" ]]; then
              py36_expr+=" | map(select(.arch == \"$arch\"))"
            fi
            echo "py36_matrix=$(echo "$full_py36_matrix" | jq -c "$py36_expr")" >> "$GITHUB_OUTPUT"
          else
            echo "py36_matrix=[]" >> "$GITHUB_OUTPUT"
          fi

  build_wheels_modern:
    name: Build wheels for Python ${{ matrix.python-version }} on ${{ matrix.arch }}
    needs: setup-matrix
    if: ${{ needs.setup-matrix.outputs.modern_matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.modern_matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: stage
        name: Stage release tree
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp_pybuild_stage"
          stage_dir=$(mktemp -d "$GITHUB_WORKSPACE/.tmp_pybuild_stage/release.XXXXXX")
          bash ./scripts/python/stage_release_tree.sh "$stage_dir" >/dev/null
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: ${{ steps.stage.outputs.stage_dir }}
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: ${{ matrix.cibw-build-id }}

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.python-version }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_wheels_legacy:
    name: Build wheels for Python ${{ matrix.python-version }} on ${{ matrix.arch }}
    needs: setup-matrix
    if: ${{ needs.setup-matrix.outputs.legacy_matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.legacy_matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: stage
        name: Stage release tree
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp_pybuild_stage"
          stage_dir=$(mktemp -d "$GITHUB_WORKSPACE/.tmp_pybuild_stage/release.XXXXXX")
          bash ./scripts/python/stage_release_tree.sh "$stage_dir" >/dev/null
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        with:
          package-dir: ${{ steps.stage.outputs.stage_dir }}
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: ${{ matrix.cibw-build-id }}

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.python-version }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_wheels_py36:
    name: Build wheels for Python 3.6 on ${{ matrix.arch }}
    needs: setup-matrix
    if: ${{ needs.setup-matrix.outputs.py36_matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.py36_matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: stage
        name: Stage release tree
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp_pybuild_stage"
          stage_dir=$(mktemp -d "$GITHUB_WORKSPACE/.tmp_pybuild_stage/release.XXXXXX")
          bash ./scripts/python/stage_release_tree.sh "$stage_dir" >/dev/null
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.11.4
        with:
          package-dir: ${{ steps.stage.outputs.stage_dir }}
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: "cp36-*"

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-3.6-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: stage
        name: Stage release tree
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp_pybuild_stage"
          stage_dir=$(mktemp -d "$GITHUB_WORKSPACE/.tmp_pybuild_stage/release.XXXXXX")
          bash ./scripts/python/stage_release_tree.sh "$stage_dir" >/dev/null
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist "${{ steps.stage.outputs.stage_dir }}"

      - name: Validate source distribution contents
        run: |
          tar -tzf dist/*.tar.gz | grep -q '/CMakeLists.txt$'
          tar -tzf dist/*.tar.gz | grep -q '/cmake/VSAGPythonBindings.cmake$'
          tar -tzf dist/*.tar.gz | grep -q '/src/CMakeLists.txt$'
          tar -tzf dist/*.tar.gz | grep -q '/include/vsag/index.h$'
          tar -tzf dist/*.tar.gz | grep -q '/python_bindings/module.cpp$'
          tar -tzf dist/*.tar.gz | grep -q '/tests/python/run_test.py$'
          tar -tzf dist/*.tar.gz | grep -q '/pyvsag/_version.py$'

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish_on_tag:
    name: Publish packages on v* tag
    needs: [build_wheels_modern, build_wheels_legacy, build_wheels_py36, build_sdist]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List distribution files
        run: ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
