name: Python Build & Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main", "0.*"]

permissions:
  contents: read

jobs:
  build_and_test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            arch: x86_64
            runner: ubuntu-22.04
          - python-version: "3.10"
            arch: aarch64
            runner: ubuntu-22.04-arm
          - python-version: "3.7"
            arch: x86_64
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare environment
        run: |
          sudo bash ./scripts/deps/install_deps_ubuntu.sh
          sudo apt-get update
          sudo apt-get install -y python3-venv

      - name: Build and test wheel
        run: |
          rm -rf ./wheelhouse
          export CMAKE_GENERATOR="Ninja"
          make pyvsag PY_VERSION=${{ matrix.python-version }}

      - name: Upload wheel artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: wheelhouse-${{ matrix.python-version }}-${{ matrix.arch }}-${{ github.run_id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7
