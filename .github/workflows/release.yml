# .github/workflows/release.yml
name: Create Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to create the release from'
        required: true
        default: 'main'
        type: string
      tag_name:
        description: 'The tag for the new release (e.g., v1.0.0)'
        required: true
        type: string
      python_publish_target:
        description: 'Where to publish Python wheels during this release.'
        required: false
        default: 'pypi'
        type: choice
        options:
          - pypi
          - testpypi
          - none
      python-version:
        description: 'Optional Python version filter for wheel publishing tests.'
        required: false
        type: string
      arch:
        description: 'Optional architecture filter for wheel publishing tests.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Package release assets
        run: |
          echo "Packaging release assets..."
          bash ./scripts/release/dist.sh

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.tag_name }}
          generate_release_notes: true
          files: dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python-packages:
    name: Publish Python packages
    needs: build-and-release
    if: ${{ github.event.inputs.python_publish_target != 'none' }}
    uses: ./.github/workflows/build_release_wheel.yml
    with:
      ref: ${{ github.event.inputs.tag_name }}
      python_version: ${{ github.event.inputs['python-version'] }}
      arch: ${{ github.event.inputs.arch }}
      publish_target: ${{ github.event.inputs.python_publish_target }}
      upload_to_release: true
      release_tag: ${{ github.event.inputs.tag_name }}
    secrets: inherit
