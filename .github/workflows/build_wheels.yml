name: Build Wheels
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build ${{ matrix.python }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 builds
          - python: cp38
            arch: x86_64
            runner: ubuntu-latest
          - python: cp39
            arch: x86_64
            runner: ubuntu-latest
          - python: cp310
            arch: x86_64
            runner: ubuntu-latest
          - python: cp311
            arch: x86_64
            runner: ubuntu-latest
          - python: cp312
            arch: x86_64
            runner: ubuntu-latest
          # aarch64 builds
          - python: cp38
            arch: aarch64
            runner: ubuntu-22.04-arm
          - python: cp39
            arch: aarch64
            runner: ubuntu-22.04-arm
          - python: cp310
            arch: aarch64
            runner: ubuntu-22.04-arm
          - python: cp311
            arch: aarch64
            runner: ubuntu-22.04-arm
          - python: cp312
            arch: aarch64
            runner: ubuntu-22.04-arm
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for setuptools_scm
      
      - name: Clean workspace
        run: |
          rm -rf python/pyvsag/*.so
          rm -rf python/example*.so
          rm -rf build*/
          rm -rf wheelhouse/

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.12.0
        with:
          package-dir: python
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          
          # 只构建当前 matrix 的 Python 版本
          CIBW_BUILD: "${{ matrix.python }}-*"
          
          CIBW_SKIP: "pp* *-musllinux*"
          
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014

          CIBW_BEFORE_ALL: |
            # Fix CentOS 7 repos
            sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
  
            # Fix aarch64 specific issues
            if [[ "$(uname -m)" == "aarch64" ]]; then
              rm -f /etc/yum.repos.d/CentOS-SCLo-*.repo
            fi
  
            yum clean all
            
            # Install development tools
            yum install -y gcc gcc-c++ gcc-gfortran python3-devel cmake
            
            # Install other dependencies
            yum install -y libaio-devel libcurl-devel ca-certificates
            
            # Install Intel MKL (only for x86_64)
            if [[ "$(uname -m)" == "x86_64" ]]; then
              yum-config-manager --add-repo https://yum.repos.intel.com/mkl/setup/intel-mkl.repo
              rpm --import https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS-2019.PUB
              yum install -y intel-mkl-64bit-2020.0-088
            fi
            
            # For OpenMP
            yum install -y libgomp
            
            # Clean old .so files
            rm -rf python/pyvsag/*.so
            rm -rf python/example*.so
          
          CIBW_BEFORE_BUILD: |
            rm -f python/pyvsag/*.so
            rm -f python/example*.so
            bash scripts/build_cpp_for_cibw.sh
          
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
            auditwheel repair -w {dest_dir} {wheel} \
              --exclude libstdc++.so.6 \
              --exclude libgcc_s.so.1 \
              --exclude libgomp.so.1 \
              --exclude libgfortran.so.3 \
              --exclude libgfortran.so.4 \
              --exclude libgfortran.so.5 \
            || cp {wheel} {dest_dir}/
          
          CIBW_ENVIRONMENT: |
            CXXFLAGS="-static-libstdc++ -static-libgcc"
            LDFLAGS="-static-libstdc++ -static-libgcc"
      
      - name: List built wheels
        run: |
          ls -la wheelhouse/ || echo "No wheels built"
          
      - name: Verify wheel content
        if: always()
        run: |
          if [ -d "wheelhouse" ] && [ "$(ls -A wheelhouse)" ]; then
            pip install wheel
            for wheel in wheelhouse/*.whl; do
              echo "Checking $(basename $wheel)"
              python -m wheel unpack "$wheel" -d /tmp/check
              
              # Count .so files
              PYVSAG_COUNT=$(find /tmp/check -name "_pyvsag*.so" | wc -l)
              if [ "$PYVSAG_COUNT" -ne 1 ]; then
                echo "ERROR: Expected 1 _pyvsag*.so, found $PYVSAG_COUNT"
                find /tmp/check -name "*.so" -exec basename {} \;
                exit 1
              fi
              
              # Check no example.so
              if find /tmp/check -name "example*.so" | grep -q .; then
                echo "ERROR: Found example.so in wheel!"
                exit 1
              fi
              
              echo "✓ Wheel content verified"
              rm -rf /tmp/check
            done
          else
            echo "No wheels found to verify"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wheels-${{ matrix.python }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: warn  # 改为 warn，这样 cp312 失败不会导致整个 job 失败